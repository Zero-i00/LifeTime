services:
  frontend:
    build:
      context: .
      dockerfile: docker/local/Dockerfile
    container_name: frontend
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge