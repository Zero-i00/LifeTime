services:
  db:
    image: postgres:17.4-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    volumes:
      - db:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: backend
    build:
      context: .
      dockerfile: docker/local/Dockerfile
    depends_on:
      db:
          condition: service_healthy
    volumes:
      - .:/app
    env_file:
      - .env
    networks:
      - app-network
    restart: on-failure

volumes:
  db:
    driver: local

networks:
  app-network:
    driver: bridge
